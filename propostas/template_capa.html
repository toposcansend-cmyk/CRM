<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Proposta Comercial - Toposcan</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', 'Arial', sans-serif;
            background: #FFFFFF;
            color: #000000;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 20mm;
        }
        .logo {
            text-align: center;
            margin-bottom: 15mm;
        }
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .logo-icon {
            display: inline-block;
            margin-left: 10px;
        }
        .logo-icon svg {
            width: 30px;
            height: 25px;
        }
        .header-info {
            text-align: left;
            margin-bottom: 10mm;
        }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5mm;
            text-transform: uppercase;
        }
        .client {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15mm;
        }
        .ac {
            text-align: left;
            font-size: 14px;
            margin-bottom: 15mm;
        }
        .illustration {
            text-align: center;
            margin: 15mm 0;
            height: 80mm;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .illustration svg {
            width: 120mm;
            height: 80mm;
        }
        .proposal-id {
            text-align: center;
            font-size: 14px;
            margin-bottom: 3mm;
        }
        .divider {
            width: 80mm;
            height: 1px;
            background: #000000;
            margin: 3mm auto;
        }
        .proposal-desc {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20mm;
        }
        .date {
            text-align: center;
            font-size: 12px;
            position: absolute;
            bottom: 20mm;
            left: 0;
            right: 0;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo">
        <span class="logo-text">TOPOSCAN</span>
        <span class="logo-icon">
            <svg viewBox="0 0 30 25" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="10" width="6" height="14" stroke="#000" stroke-width="2"/>
                <rect x="10" y="5" width="6" height="19" stroke="#000" stroke-width="2"/>
                <rect x="19" y="1" width="6" height="23" stroke="#000" stroke-width="2"/>
                <rect x="0" y="0" width="28" height="25" rx="2" stroke="#000" stroke-width="2" stroke-dasharray="4 2"/>

    <div class="ac">A/C: Mirian</div>

            <line x1="20" y1="180" x2="380" y2="180" stroke="#DDD" stroke-width="0.5"/>
            <line x1="20" y1="160" x2="380" y2="160" stroke="#DDD" stroke-width="0.5"/>
            <line x1="20" y1="140" x2="380" y2="140" stroke="#DDD" stroke-width="0.5"/>
            <line x1="20" y1="120" x2="380" y2="120" stroke="#DDD" stroke-width="0.5"/>
            <line x1="20" y1="100" x2="380" y2="100" stroke="#DDD" stroke-width="0.5"/>
        </svg>
    </div>
    
    <div class="proposal-id">Proposta 02202626.0</div>
    <div class="divider"></div>
    <div class="proposal-desc">Proposta de Levantamento e Produtos de Engenharia</div>
    
    <div class="date">02 de março de 2026</div>
</body>
</html>
